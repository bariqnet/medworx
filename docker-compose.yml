version: '3.8'

services:
  # MongoDB for local development
  mongodb:
    image: mongo:7
    container_name: medworx-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: medworxadmin
      MONGO_INITDB_ROOT_PASSWORD: medworx2026
      MONGO_INITDB_DATABASE: medworx
    volumes:
      - mongodb_data:/data/db
    networks:
      - medworx-network

  # Mongo Express (optional - DB admin UI)
  mongo-express:
    image: mongo-express:1
    container_name: medworx-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: medworxadmin
      ME_CONFIG_MONGODB_ADMINPASSWORD: medworx2026
      ME_CONFIG_MONGODB_URL: mongodb://medworxadmin:medworx2026@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongodb
    networks:
      - medworx-network

volumes:
  mongodb_data:

networks:
  medworx-network:
    driver: bridge